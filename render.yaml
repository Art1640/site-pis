services:
  # Backend API Service
  - type: web
    name: pissenlits-backend
    env: python
    runtime: python-3.12.0
    region: frankfurt  # Choose region closest to you
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python app.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false  # Don't sync from repo, set manually in Render dashboard
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard with Supabase connection string
    healthCheckPath: /api/health

